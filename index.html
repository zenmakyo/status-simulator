<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ステータスシミュレータ｜全魔協（げんもの）</title>
<link rel="stylesheet" href="style.css">

<meta name="description" content="変化後や転生後のステータスをシミュレートできます。">
<meta name="robots" content="index,follow">

<link rel="canonical" href="https://zenmakyo.github.io/status-simulator/">
<meta property="og:site_name" content="全魔協（げんもの）">
<meta property="og:title" content="ステシミュ｜全魔協（げんもの）">
<meta property="og:description" content="転生後のステータスをシミュレートできます">
<meta property="og:url" content="https://zenmakyo.github.io/status-simulator/">
<meta property="og:type" content="website">
<meta property="og:locale" content="ja_JP">

<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="ステシミュ｜全魔協（げんもの）">
<meta name="twitter:description" content="ステータスシミュレータ｜全魔協（げんもの）">

<link rel="icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kurenaido&display=swap" rel="stylesheet">
<script type="application/ld+json">
{
 "@context": "https://schema.org",
 "@type": "WebSite",
 "name": "全魔協（げんもの）",
 "url": "https://zenmakyo.github.io/status-simulator/"
}
</script>
</head>

<body>
  <h1>育成予測計算</h1>

<div class="box-master">
  <table class="genju">
   <tr>
    <td class="genju-ex">幻獣名</td>
    <td class="genju-name">さなぎ</td>
    <td class="genju-re">
     <div style="font-size: 16px;">0</div>
     <div style="font-size: 8px;">転目</div>
    </td>
   </tr>
  </table>
  <table class="genju-item">
   <tr>
    <td class="genju-ex">変化名</td>
    <td class="item-name">幻獣の繭</td>
   </tr>
  </table>
  <table class="genju-status">
   <tr>
    <td class="genju-ex">幻獣Lv</td>
    <td class="genju-display">1</td>
    <td class="genju-ex">Status Point</td>
    <td class="genju-sp"></td>
   </tr>
   <tr>
    <td class="genju-ex">上限Lv</td>
    <td class="genju-display">200</td>
    <td class="genju-ex">Stamina</td>
    <td style="border-bottom: 1px solid #d4acad;">
     <div class="genju-value">70</div>
     <div class="genju-point">(5pt)</div>
    </td>
   </tr>
   <tr>
    <td class="genju-ex">Class</td>
    <td class="genju-display">F</td>
    <td class="genju-ex">Attack</td>
    <td style="border-bottom: 1px solid #d4acad;">
     <div class="genju-value">20</div>
     <div class="genju-point">(5pt)</div>
    </td>
   </tr>
   <tr>
    <td class="genju-ex">属性</td>
    <td class="genju-display">無</td>
    <td class="genju-ex">Defence</td>
    <td style="border-bottom: 1px solid #d4acad;">
     <div class="genju-value">22</div>
     <div class="genju-point">(5pt)</div>
    </td>
   </tr>
  </table>
  <table class="genju-output">
   <tr>
    <td class="output"></td>
    <td class="genju-ex">Luck</td>
    <td>
     <div class="genju-value">5</div>
     <div class="genju-point">(5pt)</div>
    </td>
   </tr>
  </table>
</div>
 
</body>
</html>
